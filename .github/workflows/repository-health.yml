name: Repository health

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-health:
    name: Repository health checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          forbidden_paths=(
            "_build"
            "deps"
            ".elixir_ls"
            ".mix"
            "node_modules"
            "dist"
            "build"
            ".cache"
            ".pytest_cache"
            "__pycache__"
          )

          while IFS= read -r tracked_path; do
            for path in "${forbidden_paths[@]}"; do
              case "${tracked_path}" in
                "${path}"|"${path}"/*|*/"${path}"|*/"${path}"/*)
                  echo "Forbidden generated artifact is tracked: ${path}"
                  echo "${tracked_path}"
                  exit 1
                  ;;
              esac
            done
          done < <(git ls-files)

      - name: Check for suspicious secret-like files
        shell: bash
        run: |
          set -euo pipefail
          suspicious_files="$(git ls-files | grep -Ei '(^|/)(\.env(\..*)?|.*\.(pem|key|p12|pfx)|id_rsa|id_ed25519)$' || true)"
          if [ -n "$suspicious_files" ]; then
            echo "Suspicious secret-like files are tracked:"
            echo "$suspicious_files"
            exit 1
          fi

      - name: Validate JSON and JSONL files
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          files = [
              file_name
              for file_name in subprocess.check_output(
                  ["git", "ls-files"],
                  text=True
              ).splitlines()
              if file_name.endswith((".json", ".jsonl"))
          ]

          if not files:
              print("No JSON/JSONL files found.")
              sys.exit(0)

          failed = False

          for file_name in files:
              path = Path(file_name)
              try:
                  if path.suffix == ".jsonl":
                      with path.open("r", encoding="utf-8") as fh:
                          for idx, line in enumerate(fh, start=1):
                              line = line.strip()
                              if line:
                                  json.loads(line)
                  else:
                      with path.open("r", encoding="utf-8") as fh:
                          json.load(fh)
              except Exception as exc:
                  print(f"Invalid JSON in {file_name}: {exc}")
                  failed = True

          if failed:
              sys.exit(1)
          PY

      - name: Validate YAML files
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --quiet pyyaml==6.0.2

          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path
          import yaml

          files = [
              file_name
              for file_name in subprocess.check_output(
                  ["git", "ls-files"],
                  text=True
              ).splitlines()
              if file_name.endswith((".yml", ".yaml"))
          ]

          if not files:
              print("No YAML files found.")
              sys.exit(0)

          failed = False

          for file_name in files:
              path = Path(file_name)
              try:
                  with path.open("r", encoding="utf-8") as fh:
                      list(yaml.safe_load_all(fh))
              except Exception as exc:
                  print(f"Invalid YAML in {file_name}: {exc}")
                  failed = True

          if failed:
              sys.exit(1)
          PY

      - name: Markdown lint
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' md_files < <(git ls-files -z '*.md')
          if [ "${#md_files[@]}" -eq 0 ]; then
            echo "No Markdown files found."
            exit 0
          fi

          printf '%s\0' "${md_files[@]}" | xargs -0 npx --yes markdownlint-cli2@0.14.0
